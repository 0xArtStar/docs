<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Path Gradient -->
    <linearGradient id="path-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="path-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="path-grad-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Effect for Schelling Point -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />

  <!-- Grid lines -->
  <path d="M 100 80 L 100 320 M 300 80 L 300 320 M 500 80 L 500 320" stroke="#334155" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Time Axis / Generations -->
  <text x="100" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">Gen X</text>
  <text x="300" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">Millennials</text>
  <text x="500" y="350" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle">Gen Z / Alpha</text>
  <text x="680" y="350" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Future Consensus</text>

  <!-- Title -->
  <text x="400" y="40" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Cultural Schelling Point Convergence</text>

  <!-- Converging Paths -->
  <!-- Top path -->
  <path d="M 50 100 C 250 120, 450 180, 650 200" fill="none" stroke="url(#path-grad-1)" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="100" r="4" fill="#3b82f6" />
  
  <!-- Middle-top path -->
  <path d="M 50 150 C 250 160, 450 190, 650 200" fill="none" stroke="url(#path-grad-2)" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="150" r="4" fill="#8b5cf6" />

  <!-- Middle-bottom path -->
  <path d="M 50 250 C 250 240, 450 210, 650 200" fill="none" stroke="url(#path-grad-3)" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="250" r="4" fill="#6366f1" />

  <!-- Bottom path -->
  <path d="M 50 300 C 250 280, 450 220, 650 200" fill="none" stroke="url(#path-grad-1)" stroke-width="4" stroke-linecap="round" />
  <circle cx="50" cy="300" r="4" fill="#3b82f6" />

  <!-- Labels for initial states -->
  <text x="60" y="95" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Scattered Preferences</text>
  <text x="60" y="315" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Fragmented Attention</text>

  <!-- Intermediate Process Label -->
  <rect x="230" y="140" width="140" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="300" y="158" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Cultural Capital</text>
  <text x="300" y="172" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">(Bourdieu)</text>

  <rect x="430" y="240" width="140" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="500" y="258" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Collective Memory</text>
  <text x="500" y="272" fill="#cbd5e1" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">(Halbwachs &amp; Web3)</text>

  <!-- Schelling Point (Focal Point) -->
  <circle cx="650" cy="200" r="16" fill="#fde047" filter="url(#glow)" />
  <circle cx="650" cy="200" r="6" fill="#ca8a04" />
  
  <rect x="580" y="130" width="140" height="40" rx="8" fill="#ca8a04" fill-opacity="0.2" stroke="#fde047" stroke-width="1" />
  <text x="650" y="148" fill="#fde047" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Schelling Point</text>
  <text x="650" y="162" fill="#fef08a" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Pr(a → F) = High</text>
  
  <!-- Connector line to Schelling point label -->
  <path d="M 650 170 L 650 184" stroke="#fde047" stroke-width="1" stroke-dasharray="2 2" />

</svg>
